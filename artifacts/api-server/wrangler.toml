name = "motubu-api"
main = "src/worker.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables — set DATABASE_URL as a secret:
#   wrangler secret put DATABASE_URL
# Then enter your Supabase Transaction Pooler URL when prompted:
#   postgresql://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres
#
# Optional: restrict CORS to your Pages domain
# [vars]
# CORS_ORIGIN = "https://motubu.pages.dev"

[observability]
enabled = true
